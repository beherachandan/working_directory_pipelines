<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Wayground{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --purple:        #7C3AED;
      --purple-dark:   #6D28D9;
      --purple-light:  #EDE9FE;
      --teal:          #0D9488;
      --teal-light:    #CCFBF1;
      --dark:          #1E1B2E;
      --muted:         #6B7280;
      --surface:       #FFFFFF;
      --bg:            #F8F7FF;
      --border:        #E5E7EB;
      --red:           #DC2626;
      --red-light:     #FEF2F2;
      --radius:        10px;
      --shadow:        0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--dark);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Nav ── */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 16px;
      color: var(--dark);
      text-decoration: none;
    }

    .nav-logo-mark {
      width: 28px;
      height: 28px;
      background: var(--purple);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-logo-mark svg { display: block; }

    .nav-right { display: flex; align-items: center; gap: 16px; }

    .nav-link {
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: color .15s;
    }
    .nav-link:hover { color: var(--dark); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 18px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity .15s, background .15s;
      text-decoration: none;
      white-space: nowrap;
    }
    .btn:disabled { opacity: .55; cursor: not-allowed; }

    .btn-primary {
      background: var(--purple);
      color: #fff;
    }
    .btn-primary:hover:not(:disabled) { background: var(--purple-dark); }

    .btn-outline {
      background: var(--surface);
      color: var(--dark);
      border: 1px solid var(--border);
    }
    .btn-outline:hover:not(:disabled) { background: var(--bg); }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    /* ── Badge ── */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 600;
      background: var(--purple-light);
      color: var(--purple);
    }

    /* ── Spinner ── */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--purple);
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Status messages ── */
    .status-success {
      color: var(--teal);
      background: var(--teal-light);
      border: 1px solid #99F6E4;
      border-radius: 7px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 500;
    }
    .status-error {
      color: var(--red);
      background: var(--red-light);
      border: 1px solid #FECACA;
      border-radius: 7px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 500;
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav>
    <a href="/" class="nav-logo">
      <div class="nav-logo-mark">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M3 8L7 12L13 4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      Wayground
    </a>
    <div class="nav-right">
      {% block nav_right %}{% endblock %}
    </div>
  </nav>

  {% block content %}{% endblock %}
</body>
</html>
